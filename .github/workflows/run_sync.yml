name: Automated Price Sync

on:
  schedule:
    # Runs hourly 9:00 AM to 8:00 PM PKT (4:00 AM to 3:00 PM UTC), Monday to Thursday + Saturday & Sunday
    - cron: '0 4-15 * * 0-4,6'
  workflow_dispatch: # Allows manual trigger from your smartphone anytime

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Environment Runtime
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install playwright pandas openpyxl
        playwright install chromium

    - name: Execute Scraper Operation
      env:
        STORE_USER: ${{ secrets.STORE_USER }}
        STORE_PASS: ${{ secrets.STORE_PASS }}
      run: python sync.py

    - name: Commit Fresh Sheet Changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name 'Cloud Sync Operator'
        git config --global user.email 'operator@cloudsync.local'
        git add salesman_prices.xlsx
        git commit -m "Auto-update: Fresh prices snapshot synced" || exit 0
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
